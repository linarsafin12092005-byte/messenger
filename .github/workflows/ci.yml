name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install flake8
      
      - name: Lint with flake8
        run: |
          flake8 app/ --count --max-complexity=10 --statistics
        continue-on-error: true
      
      - name: Build Docker image
        run: docker build -t messenger .
      
      - name: Run container
        run: |
          docker run -d -p 8000:8000 --name messenger-test messenger
          echo "Waiting for app to start..."
      
      - name: Wait for app to be ready
        run: |
          for i in {1..30}; do
            echo "Attempt $i/30..."
            if curl -f http://localhost:8000/health 2>/dev/null; then
              echo "App is ready!"
              exit 0
            fi
            sleep 2
          done
          echo "App failed to start"
          exit 1
      
      - name: Stop and remove container
        if: always()
        run: |
          docker stop messenger-test || true
          docker rm messenger-test || true