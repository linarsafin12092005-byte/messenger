name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    
    steps:
      # 1. Клонируем код
      - name: Checkout code
        uses: actions/checkout@v3
      
      # 2. Устанавливаем Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      # 3. Устанавливаем зависимости
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio
      
      # 4. Запускаем линтер (проверка кода)
      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 app/ --count --max-complexity=10 --statistics
      
      # 5. Запускаем тесты (если есть)
      - name: Run tests
        run: |
          pytest tests/ -v --tb=short
        continue-on-error: true
      
      # 6. Собираем Docker образ
      - name: Build Docker image
        run: docker build -t messenger:${{ github.sha }} .
      
      # 7. Запускаем контейнер для проверки
      - name: Test container
        run: |
          docker run -d -p 8000:8000 --name messenger-test messenger:${{ github.sha }}
          sleep 5
          curl -f http://localhost:8000/health || exit 1
          docker stop messenger-test
          docker rm messenger-test
      
      # 8. Логинимся в Docker Hub (опционально)
      - name: Login to Docker Hub
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      # 9. Пушим образ в Docker Hub (опционально)
      - name: Push to Docker Hub
        if: github.ref == 'refs/heads/main'
        run: |
          docker tag messenger:${{ github.sha }} your-dockerhub/messenger:latest
          docker push your-dockerhub/messenger:latest