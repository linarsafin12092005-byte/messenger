name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: messenger
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t messenger .

      - name: Run container
        run: |
          docker run -d \
            --name messenger-test \
            -p 8000:8000 \
            -e DATABASE_URL=postgresql://user:password@localhost:5432/messenger \
            messenger \
            uvicorn main:app --host 0.0.0.0 --port 8000

      - name: Wait for app to be ready
        run: |
          for i in {1..30}; do
            echo "Attempt $i/30..."
            if curl -f http://localhost:8000/health 2>/dev/null; then
              echo "✅ App is ready!"
              exit 0
            fi
            sleep 2
          done
          echo "❌ App failed to start"
          exit 1

      - name: Show logs on failure
        if: failure()
        run: docker logs messenger-test

      - name: Cleanup
        if: always()
        run: |
          docker stop messenger-test || true
          docker rm messenger-test || true