name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install flake8
      
      - name: Lint with flake8
        run: |
          flake8 app/ --count --max-complexity=10 --statistics
        continue-on-error: true
      
      - name: Build Docker image
        run: docker build -t messenger:${{ github.sha }} .
      
      - name: Test container
        run: |
          docker run -d -p 8000:8000 --name messenger-test messenger:${{ github.sha }}
          sleep 10
          curl -f http://localhost:8000/health || exit 1
          docker stop messenger-test
          docker rm messenger-test